[build]
  # Only build the frontend. The Netlify function (server.js) is pre-built
  # and committed to the repo — Netlify must NOT re-bundle it.
  command = "npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  # Pre-bundled by esbuild — tell Netlify to use it as-is
  node_bundler = "none"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
