[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Runtime environment variables — available to Netlify Functions at request time.
# These are the only 3 values needed to bootstrap the app.
# All other secrets (Gemini, Shopify, Meta) live in Supabase vault and are
# fetched at runtime via the secrets-proxy edge function.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 3000

[[edge_functions]]
  path = "/.netlify/edge-functions/env-config"
  function = "env-config"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
